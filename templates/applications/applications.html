{% extends "sidebar.html" %}
{% load static %}
{% block content %}

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

<style>
:root{
  --panel:#111a33;
  --panel2:#0f1730;
  --text:#ffffff;
  --muted:#cbd5ff;
  --border:rgba(255,255,255,.10);
  --primary:#6c7dff;
  --primary2:#8b5cf6;
  --danger:#ff4d6d;
}

/* ============================= */
/* LAYOUT                        */
/* ============================= */

.wrap{
  max-width:1400px;
  margin:auto;
  padding:40px 30px;
}

.card{
  background:var(--panel);
  border:1px solid var(--border);
  padding:25px;
  border-radius:16px;
  margin-bottom:20px;
}

h1{color:#fff;margin-bottom:20px;font-size:22px;}

/* ============================= */
/* BUTTONS                       */
/* ============================= */

button{
  padding:10px 14px;
  border-radius:10px;
  border:0;
  cursor:pointer;
  font-weight:600;
  color:#fff;
  background:linear-gradient(135deg,var(--primary),var(--primary2));
}

.btnGhost{background:rgba(255,255,255,.08);border:1px solid var(--border);}
.btnDanger{background:var(--danger);}

/* ============================= */
/* TABLE                         */
/* ============================= */

.table-wrapper{
  width:100%;
  overflow-x:auto;
  margin-top:20px;
  -webkit-overflow-scrolling:touch;
}

table{
  width:100%;
  border-collapse:collapse;
  min-width:600px;
}

th,td{
  padding:14px;
  text-align:center;
  border-bottom:1px solid var(--border);
  color:#fff;
}

th{color:var(--muted);font-size:12px;}
tr.clickable:hover{background:rgba(255,255,255,.05);cursor:pointer;}

.status{
  padding:6px 12px;
  border-radius:20px;
  font-size:11px;
  font-weight:600;
}
.Applied{background:rgba(247,201,72,.15);}
.Interview{background:rgba(108,125,255,.15);}
.Approved{background:rgba(40,209,124,.15);}
.Rejected{background:rgba(255,90,122,.15);}

/* ============================= */
/* MOBILE CARD LIST              */
/* (replaces table on mobile)    */
/* ============================= */

.mob-app-list{
  display:none;
  flex-direction:column;
  gap:12px;
  margin-top:16px;
}

.mob-app-card{
  background:var(--panel2);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px 16px;
  cursor:pointer;
  transition:background .2s;
}

.mob-app-card:hover{background:rgba(255,255,255,.06);}

.mob-app-card .mob-address{
  font-size:14px;
  font-weight:600;
  color:#fff;
  margin-bottom:6px;
}

.mob-app-card .mob-meta{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:6px;
}

.mob-app-card .mob-info{
  font-size:12px;
  color:var(--muted);
}

/* ============================= */
/* DETAIL SECTION                */
/* ============================= */

#detailSection{display:none;}

.detail-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.detail-item{
  background:var(--panel2);
  padding:12px;
  border-radius:10px;
}

.label{color:var(--muted);font-size:12px;}
.value{color:#fff;font-size:14px;margin-top:4px;word-break:break-word;}

.actions{
  margin-top:20px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

/* ============================= */
/* MODAL                         */
/* ============================= */

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
  padding:16px;
}

.modal-content{
  background:var(--panel);
  padding:30px;
  border-radius:16px;
  width:850px;
  max-width:100%;
  max-height:90vh;
  overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.6);
}

.modal-title{
  font-size:22px;
  margin-bottom:20px;
  color:white;
  font-weight:bold;
}

/* ============================= */
/* FORM GRID                     */
/* ============================= */

.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

input,select,textarea{
  padding:10px;
  border-radius:8px;
  border:1px solid var(--border);
  background:var(--panel2);
  color:#fff;
  width:100%;
  font-size:13px;
}

.full{grid-column:1/-1;}

/* ============================= */
/* TOAST                         */
/* ============================= */

.toast{
  position:fixed;
  bottom:24px;
  left:50%;
  transform:translateX(-50%);
  background:var(--panel);
  padding:10px 16px;
  border-radius:10px;
  font-size:13px;
  opacity:0;
  transition:.3s;
  z-index:10000;
  white-space:nowrap;
  pointer-events:none;
}

.toast.show{opacity:1;}

/* ============================= */
/* FLATPICKR DARK THEME          */
/* ============================= */

.flatpickr-calendar{background:#111a33 !important;border:1px solid var(--border);}
.flatpickr-month,
.flatpickr-current-month,
.flatpickr-current-month input.cur-year,
.flatpickr-monthDropdown-months{color:#fff !important;background:transparent !important;}
.flatpickr-weekdays{background:#111a33 !important;}
.flatpickr-weekdays .flatpickr-weekday{color:#fff !important;font-weight:600;}
.flatpickr-day{color:#fff !important;border-radius:6px;}
.flatpickr-day:hover{background:rgba(108,125,255,.25) !important;color:#fff !important;}
.flatpickr-day.today{border:1px solid var(--primary) !important;}
.flatpickr-day.selected{background:linear-gradient(135deg,var(--primary),var(--primary2)) !important;color:#fff !important;}
.flatpickr-prev-month svg,
.flatpickr-next-month svg{fill:#fff !important;}

/* ============================= */
/* RESPONSIVE — TABLET (≤900px)  */
/* ============================= */

@media(max-width:900px){
  .wrap{padding:20px 15px;}

  .form-grid{grid-template-columns:1fr;}
  .full{grid-column:auto;}
}

/* ============================= */
/* RESPONSIVE — MOBILE (≤640px)  */
/* ============================= */

@media(max-width:640px){

  .wrap{
    padding:62px 12px 40px; /* 62px top clears mobile hamburger */
  }

  h1{font-size:18px;margin-bottom:14px;}

  .card{
    padding:16px 14px;
    border-radius:14px;
  }

  /* Hide desktop table, show mobile card list */
  .table-wrapper{display:none;}
  .mob-app-list{display:flex;}

  /* Detail grid: single column */
  .detail-grid{grid-template-columns:1fr;}

  .actions{flex-direction:column;}
  .actions button{width:100%;text-align:center;}

  /* Modal: tighter padding */
  .modal-content{
    padding:20px 16px;
    border-radius:14px;
    max-height:88vh;
  }

  .modal-title{font-size:18px;margin-bottom:14px;}

  /* Toast full-width */
  .toast{
    left:12px;
    right:12px;
    transform:none;
    text-align:center;
    white-space:normal;
  }
}

/* ============================= */
/* RESPONSIVE — SMALL (≤400px)   */
/* ============================= */

@media(max-width:400px){
  input,select,textarea{font-size:12px;padding:9px;}
}
</style>

<div class="wrap">

<div class="card" id="listSection">
  <h1>Application Tracker</h1>
  <button onclick="openModal()">+ Add New Application</button>

  <!-- Desktop table -->
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Property</th>
          <th>Status</th>
          <th>Date Applied</th>
          <th>Rent</th>
          <th>Docs</th>
        </tr>
      </thead>
      <tbody id="appTable"></tbody>
    </table>
  </div>

  <!-- Mobile card list -->
  <div class="mob-app-list" id="mobAppList"></div>
</div>

<div class="card" id="detailSection">
  <h1>Application Details</h1>
  <div class="detail-grid" id="detailContent"></div>
  <div class="actions">
    <button onclick="editCurrent()">Edit</button>
    <button class="btnDanger" onclick="openDeleteModal()">Delete</button>
    <button class="btnGhost" onclick="backToList()">Back</button>
  </div>
</div>

</div>

<!-- FORM MODAL -->
<div class="modal" id="formModal">
  <div class="modal-content">
    <div class="modal-title" id="modalTitle">New Application</div>
    <input type="hidden" id="appId">

    <div class="form-grid">
      <input type="text" id="property_address" placeholder="Property Address">
      <input type="text" id="company_name" placeholder="Company Name">
      <input type="text" id="contact_person" placeholder="Contact Person">
      <input type="email" id="contact_email" placeholder="Contact Email">
      <input type="text" id="contact_phone" placeholder="Contact Phone">
      <input type="number" id="rent_amount" placeholder="Rent Amount">

      <input type="text" id="date_applied" class="date-picker" placeholder="Select application date (YYYY-MM-DD)">
      <input type="text" id="interview_date" class="date-picker" placeholder="Select interview date (optional)">
      <input type="text" id="follow_up_date" class="date-picker" placeholder="Select follow-up reminder date">

      <select id="status">
        <option value="Applied">Applied</option>
        <option value="Interview">Interview</option>
        <option value="Approved">Approved</option>
        <option value="Rejected">Rejected</option>
      </select>

      <label class="full" style="color:white;">
        <input type="checkbox" id="documents_submitted"> Documents Submitted
      </label>

      <textarea id="notes" class="full" rows="3" placeholder="Notes..."></textarea>
    </div>

    <div class="actions">
      <button class="btnGhost" onclick="closeModal()">Cancel</button>
      <button onclick="saveApplication()">Save</button>
    </div>
  </div>
</div>

<!-- DELETE MODAL -->
<div class="modal" id="deleteModal">
  <div class="modal-content" style="width:400px;max-width:100%;">
    <h3 style="color:var(--primary);">Confirm Delete</h3>
    <p style="color:var(--muted);">Are you sure?</p>
    <div class="actions">
      <button class="btnGhost" onclick="closeDeleteModal()">Cancel</button>
      <button class="btnDanger" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script>
flatpickr(".date-picker",{dateFormat:"Y-m-d"});

const API="/api/applications/";
let currentApp=null;

document.addEventListener("DOMContentLoaded",loadApplications);

function loadApplications(){
  fetch(API).then(r=>r.json()).then(data=>{

    /* Desktop table */
    let table=document.getElementById("appTable");
    table.innerHTML="";
    data.forEach(app=>{
      table.innerHTML+=`
      <tr class="clickable" onclick="viewDetail(${app.id})">
        <td>${app.property_address}</td>
        <td><span class="status ${app.status}">${app.status}</span></td>
        <td>${app.date_applied||"-"}</td>
        <td>${app.rent_amount||"-"}</td>
        <td>${app.documents_submitted?"✅":"—"}</td>
      </tr>`;
    });

    /* Mobile card list */
    const mobList=document.getElementById("mobAppList");
    mobList.innerHTML="";
    data.forEach(app=>{
      const card=document.createElement("div");
      card.className="mob-app-card";
      card.onclick=()=>viewDetail(app.id);
      card.innerHTML=`
        <div class="mob-address">${app.property_address}</div>
        <div class="mob-meta">
          <span class="status ${app.status}">${app.status}</span>
          <span class="mob-info">${app.date_applied||"-"}</span>
          <span class="mob-info">$${app.rent_amount||"-"}</span>
          <span class="mob-info">${app.documents_submitted?"✅ Docs":"—"}</span>
        </div>
      `;
      mobList.appendChild(card);
    });

  });
}

function openModal(){
  document.getElementById("modalTitle").innerText="New Application";
  document.getElementById("appId").value="";
  document.getElementById("formModal").style.display="flex";
}

function closeModal(){
  document.getElementById("formModal").style.display="none";
}

function saveApplication(){
  let id=appId.value;
  let payload={
    property_address:property_address.value,
    company_name:company_name.value,
    contact_person:contact_person.value,
    contact_email:contact_email.value,
    contact_phone:contact_phone.value,
    rent_amount:rent_amount.value,
    date_applied:date_applied.value,
    interview_date:interview_date.value||null,
    follow_up_date:follow_up_date.value||null,
    documents_submitted:documents_submitted.checked,
    status:status.value,
    notes:notes.value
  };

  fetch(id?API+id+"/":API,{
    method:id?"PUT":"POST",
    headers:{
      "Content-Type":"application/json",
      "X-CSRFToken":getCSRFToken()
    },
    body:JSON.stringify(payload)
  }).then(()=>{
    closeModal();
    loadApplications();
    showToast("Saved Successfully");
  });
}

function viewDetail(id){
  fetch(API+id+"/").then(r=>r.json()).then(app=>{
    currentApp=app;
    let d=document.getElementById("detailContent");
    d.innerHTML="";
    for(let key in app){
      if(key==="id") continue;
      d.innerHTML+=`
      <div class="detail-item">
        <div class="label">${key.replace(/_/g," ")}</div>
        <div class="value">${app[key]||"-"}</div>
      </div>`;
    }
    document.getElementById("listSection").style.display="none";
    document.getElementById("detailSection").style.display="block";
  });
}

function backToList(){
  document.getElementById("detailSection").style.display="none";
  document.getElementById("listSection").style.display="block";
}

function editCurrent(){
  openModal();
  document.getElementById("modalTitle").innerText="Edit Application";
  for(let key in currentApp){
    if(document.getElementById(key)){
      if(document.getElementById(key).type==="checkbox"){
        document.getElementById(key).checked=currentApp[key];
      }else{
        document.getElementById(key).value=currentApp[key]||"";
      }
    }
  }
  appId.value=currentApp.id;
}

function openDeleteModal(){
  document.getElementById("deleteModal").style.display="flex";
}

function closeDeleteModal(){
  document.getElementById("deleteModal").style.display="none";
}

function confirmDelete(){
  fetch(API+currentApp.id+"/",{
    method:"DELETE",
    headers:{"X-CSRFToken":getCSRFToken()}
  })
  .then(()=>{
    closeDeleteModal();
    backToList();
    loadApplications();
    showToast("Deleted Successfully");
  });
}

function showToast(msg){
  let toast=document.getElementById("toast");
  toast.innerText=msg;
  toast.classList.add("show");
  setTimeout(()=>toast.classList.remove("show"),2000);
}

function getCSRFToken(){
  return document.cookie.split('; ')
    .find(r=>r.startsWith('csrftoken'))
    ?.split('=')[1];
}
</script>

{% endblock %}
