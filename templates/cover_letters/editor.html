{% extends "sidebar.html" %}
{% load static %}

{% block content %}

<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

<style>
:root{
  --panel:#111a33;
  --panel2:#0f1730;
  --text:#e9eefc;
  --muted:#a9b4d6;
  --border:rgba(255,255,255,.10);
  --radius:18px;
  --primary:#6c7dff;
  --primary2:#8b5cf6;
  --shadow:0 14px 30px rgba(0,0,0,.35);
  --good:#28d17c;
}

/* ============================= */
/* WRAPPER                       */
/* ============================= */

.cover-editor-wrap{
  padding:30px;
  max-width:1200px;
}

/* ============================= */
/* TOP BAR                       */
/* ============================= */

.editor-topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
  flex-wrap:wrap;
  gap:12px;
}

.editor-topbar a{
  color:var(--muted);
  text-decoration:none;
  font-size:13px;
}

.editor-topbar a:hover{
  color:var(--text);
}

.editor-actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.editor-actions button{
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  border:0;
  padding:8px 14px;
  border-radius:10px;
  color:white;
  font-weight:600;
  cursor:pointer;
}

.editor-actions .btnGhost{
  background:rgba(255,255,255,.08);
  border:1px solid var(--border);
}

/* ============================= */
/* LAYOUT                        */
/* ============================= */

.editor-layout{
  display:grid;
  grid-template-columns: 2fr 1fr;
  gap:24px;
}

/* ============================= */
/* EDITOR CARD                   */
/* ============================= */

.editor-card{
  background:white;
  border-radius:var(--radius);
  overflow:hidden;
  box-shadow:var(--shadow);
}

#editor{
  height:480px;
}

/* ============================= */
/* SCORE PANEL                   */
/* ============================= */

.score-panel{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px;
  box-shadow:var(--shadow);
  height:fit-content;
}

.score-title{
  font-size:13px;
  margin-bottom:12px;
  color:var(--muted);
}

.score-value{
  font-size:28px;
  font-weight:700;
  color:var(--good);
}

.suggestions{
  margin-top:16px;
  font-size:12px;
  color:var(--muted);
  line-height:1.6;
}

/* ============================= */
/* QUILL DARK TOOLBAR OVERRIDE   */
/* ============================= */

.ql-toolbar.ql-snow{
  background:#1a2540;
  border:none;
  border-bottom:1px solid rgba(255,255,255,.08);
  flex-wrap:wrap;
}

.ql-toolbar.ql-snow .ql-stroke{ stroke:#a9b4d6; }
.ql-toolbar.ql-snow .ql-fill{ fill:#a9b4d6; }
.ql-toolbar.ql-snow .ql-picker{ color:#a9b4d6; }
.ql-toolbar.ql-snow button:hover .ql-stroke{ stroke:#fff; }
.ql-toolbar.ql-snow button:hover .ql-fill{ fill:#fff; }

/* Disabled save button style */
.editor-actions button:disabled{
  opacity:0.55;
  cursor:default;
}

/* ============================= */
/* RESPONSIVE — TABLET (≤1024px) */
/* ============================= */

@media(max-width:1024px){
  .editor-layout{
    grid-template-columns:1fr;
  }
}

/* ============================= */
/* RESPONSIVE — MOBILE (≤640px)  */
/* ============================= */

@media(max-width:640px){

  .cover-editor-wrap{
    padding:62px 12px 40px;
  }

  .editor-topbar{
    margin-bottom:14px;
  }

  .editor-topbar a{
    font-size:12px;
  }

  .editor-actions button{
    padding:7px 12px;
    font-size:12px;
    flex:1;
    text-align:center;
  }

  .editor-layout{
    gap:16px;
  }

  .editor-card{
    border-radius:14px;
  }

  /* Taller editor on mobile so user has good writing space */
  #editor{
    height:360px;
  }

  /* Quill toolbar: allow wrapping on small screens */
  .ql-toolbar.ql-snow{
    padding:6px 8px;
  }

  .ql-toolbar.ql-snow .ql-formats{
    margin-right:8px;
    margin-bottom:4px;
  }

  .score-panel{
    padding:14px;
    border-radius:14px;
  }

  .score-value{
    font-size:22px;
  }
}

/* ============================= */
/* RESPONSIVE — SMALL (≤400px)   */
/* ============================= */

@media(max-width:400px){
  #editor{
    height:300px;
  }
}
</style>

<div class="cover-editor-wrap">

  <div class="editor-topbar">
    <div>
      <a href="/cover-letters/">← Back to List</a>
    </div>

    <div class="editor-actions">
      <button type="button" id="saveBtn" onclick="saveContent()" disabled>Saved ✓</button>
      <button class="btnGhost" onclick="exportPDF()">Export PDF</button>
    </div>
  </div>

  <div class="editor-layout">

    <!-- Editor -->
    <div class="editor-card">
      <div id="editor"></div>
    </div>

  </div>

</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function(){

  const letterId = "{{ letter_id }}";
  const csrfToken = "{{ csrf_token }}";

  const saveBtn = document.getElementById("saveBtn");

  let isDirty = false;
  let isSaving = false;
  let isInitializing = true;

  const quill = new Quill('#editor', {
    theme: 'snow'
  });

  /* ================================
     LOAD LETTER — FIXED
  ================================ */
  function loadLetter(){
    fetch(`/api/cover-letters/${letterId}/`)
    .then(res => {
      if(!res.ok){
        throw new Error("Failed to load letter");
      }
      return res.json();
    })
    .then(data => {
      // ✅ FIXED: Gemini already returns clean HTML <p> tags
      quill.clipboard.dangerouslyPasteHTML(data.content || "");

      setTimeout(() => {
        isDirty = false;
        isInitializing = false;
        saveBtn.innerText = "Saved ✓";
        saveBtn.disabled = true;
      }, 50);

    })
    .catch(error => {
      console.error("Failed to load letter:", error);
      isInitializing = false;
      alert("Failed to load cover letter content. Please refresh the page.");
    });
  }

  /* ================================
     TRACK EDITOR CHANGES
  ================================ */

  quill.on('text-change', function (delta, oldDelta, source) {

    if (isInitializing) return;

    if (source === "user" && !isSaving) {
      isDirty = true;
      saveBtn.innerText = "Save";
      saveBtn.disabled = false;
    }

  });

  /* ================================
     SAVE CONTENT
  ================================ */

  window.saveContent = function(){

    if (!isDirty || isSaving) return;

    isSaving = true;
    saveBtn.innerText = "Saving...";
    saveBtn.disabled = true;

    fetch(`/api/cover-letters/${letterId}/save/`, {
      method: "PATCH",
      headers: {
        "Content-Type": "application/json",
        "X-CSRFToken": csrfToken
      },
      body: JSON.stringify({
        edited_content: quill.root.innerHTML
      })
    })
    .then(res => {
        if(!res.ok){
            throw new Error("Save failed");
        }
        return res.json();
    })
    .then(() => {
        isDirty = false;
        isSaving = false;
        saveBtn.innerText = "Saved ✓";
        saveBtn.disabled = true;
    })
    .catch(error => {
        isSaving = false;
        saveBtn.innerText = "Save";
        saveBtn.disabled = false;
        alert("Save failed. Please try again.");
        console.error(error);
    });
  }

  /* ================================
     EXPORT PDF
  ================================ */

  window.exportPDF = function(){
    window.location.href = `/api/cover-letters/${letterId}/export/`;
  }

  loadLetter();

});
</script>

{% endblock content %}
