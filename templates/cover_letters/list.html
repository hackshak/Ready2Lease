{% extends "sidebar.html" %}
{% load static %}

{% block content %}

<style>
:root{
  --bg:#0b1020;
  --panel:#111a33;
  --panel2:#0f1730;
  --text:#e9eefc;
  --muted:#a9b4d6;
  --border:rgba(255,255,255,.10);
  --radius:18px;
  --primary:#6c7dff;
  --primary2:#8b5cf6;
  --shadow:0 14px 30px rgba(0,0,0,.35);
}

.wrap{
  max-width:1250px;
  margin:auto;
  padding:32px 24px;
}

/* TOPBAR */

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}

.topbar h2{
  color:white;
  font-size:22px;
  font-weight:600;
}

.generate-btn{
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  border:0;
  padding:11px 18px;
  border-radius:12px;
  color:white;
  font-weight:600;
  cursor:pointer;
  box-shadow:0 10px 25px rgba(108,125,255,.35);
  transition:.25s;
}

.generate-btn:hover{
  transform:translateY(-2px);
}

/* GRID */

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:22px;
}

/* CARD */

.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px;
  box-shadow:var(--shadow);
  transition:.25s;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.card:hover{
  transform:translateY(-5px);
  border-color:rgba(255,255,255,.18);
}

.card h3{
  margin:0 0 6px;
  font-size:16px;
  color:white;
}

.card small{
  color:var(--muted);
  font-size:12px;
}

/* BUTTON ROW */

.card-actions{
  display:flex;
  gap:10px;
  margin-top:18px;
}

.btn-view{
  flex:1;
  text-align:center;
  text-decoration:none;
  font-size:13px;
  font-weight:500;
  color:white;
  background:rgba(255,255,255,.08);
  padding:8px;
  border-radius:10px;
}

.btn-view:hover{
  background:rgba(255,255,255,.14);
}

.btn-edit{
  flex:1;
  text-align:center;
  text-decoration:none;
  font-size:13px;
  font-weight:500;
  color:white;
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  padding:8px;
  border-radius:10px;
}

/* EMPTY STATE */

.empty-state{
  text-align:center;
  padding:50px;
  color:var(--muted);
  border:1px dashed var(--border);
  border-radius:var(--radius);
  font-size:14px;
}

/* PREMIUM GATE STATE */

.premium-state{
  text-align:center;
  padding:50px;
  color:var(--muted);
  border:1px solid rgba(108,125,255,.35);
  border-radius:var(--radius);
  font-size:14px;
  background:rgba(108,125,255,.06);
  grid-column:1 / -1;
}

.premium-state strong{
  display:block;
  color:white;
  font-size:16px;
  margin-bottom:8px;
}

/* ================= MODAL ================= */

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:1000;
  backdrop-filter:blur(4px);
}

.modal-content{
  background:var(--panel2);
  width:820px;
  padding:28px;
  border-radius:var(--radius);
  border:1px solid var(--border);
  box-shadow:var(--shadow);
}

/* HEADER */

.modal-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:22px;
}

.modal-header h3{
  margin:0;
  font-size:17px;
  color:white;
}

.close{
  cursor:pointer;
  font-size:18px;
  color:var(--muted);
}

/* FORM GRID */

.form-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
}

.form-group{
  display:flex;
  flex-direction:column;
}

.form-group label{
  font-size:11px;
  color:var(--muted);
  margin-bottom:6px;
}

/* INPUTS */

.modal input,
.modal textarea,
.modal select{
  padding:10px 12px;
  background:rgba(255,255,255,.05);
  border:1px solid var(--border);
  border-radius:10px;
  color:white;
  font-size:12px;
}

.modal textarea{
  min-height:70px;
  resize:none;
}

.modal input:focus,
.modal textarea:focus,
.modal select:focus{
  outline:none;
  border-color:var(--primary);
  box-shadow:0 0 0 2px rgba(108,125,255,.25);
}

.full-width{
  grid-column:1 / -1;
}

/* ================================ */
/* SUBMIT BUTTON + PROGRESS BAR     */
/* ================================ */

.generate-submit{
  margin-top:22px;
  width:100%;
  padding:13px;
  border-radius:12px;
  border:0;
  font-weight:600;
  font-size:14px;
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  color:white;
  cursor:pointer;
  /* needed so the progress bar is clipped to the button's rounded corners */
  position:relative;
  overflow:hidden;
  transition:opacity .2s;
}

.generate-submit.loading{
  opacity:.85;
  pointer-events:none;
}

/* 3 px strip that sits along the bottom edge of the button */
.btn-progress-track{
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  height:3px;
  background:rgba(255,255,255,.18);
  display:none;                   /* shown only while loading */
}

/* the moving fill */
.btn-progress-bar{
  height:100%;
  width:0%;
  background:rgba(255,255,255,.9);
  border-radius:0 2px 2px 0;
  transition:width .45s ease;
  position:relative;
  overflow:hidden;
}

/* shimmer sweep on top of the fill */
.btn-progress-bar::after{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(
    90deg,
    transparent 0%,
    rgba(255,255,255,.55) 50%,
    transparent 100%
  );
  animation:bar-shimmer 1.3s infinite;
}

@keyframes bar-shimmer{
  0%  { transform:translateX(-100%); }
  100%{ transform:translateX(300%);  }
}

/* tiny spinner shown left of the label text */
.btn-spinner{
  display:inline-block;
  width:9px;
  height:9px;
  border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;
  border-radius:50%;
  animation:btn-spin .65s linear infinite;
  vertical-align:middle;
  margin-right:8px;
  margin-bottom:1px;
}

@keyframes btn-spin{
  to{ transform:rotate(360deg); }
}

@media(max-width:900px){

  .form-grid{
    grid-template-columns:1fr;
  }

  .modal-content{
    width:92%;
  }

}
</style>


<div class="wrap">

  <div class="topbar">
    <h2>My Cover Letters</h2>
    <button class="generate-btn" onclick="openModal()">
      + Generate New Cover Letter
    </button>
  </div>

  <div class="grid" id="lettersGrid"></div>

</div>


<!-- Modal -->

<div class="modal" id="generateModal">

  <div class="modal-content">

    <div class="modal-header">
      <h3>Generate Landlord-Friendly Cover Letter</h3>
      <span class="close" onclick="closeModal()">✕</span>
    </div>

    <div class="form-grid">

      <div class="form-group full-width">
        <label>Property Address</label>
        <input id="property_address" required>
      </div>

      <div class="form-group">
        <label>Full Name</label>
        <input id="name" required>
      </div>

      <div class="form-group">
        <label>Tone</label>
        <select id="tone" required>
          <option value="">Select</option>
          <option value="professional">Professional</option>
          <option value="friendly">Friendly</option>
          <option value="confident">Confident</option>
          <option value="direct">Short & Direct</option>
        </select>
      </div>

      <div class="form-group">
        <label>Employment Type</label>
        <select id="employment_type" required>
          <option value="">Select</option>
          <option value="full_time">Full Time</option>
          <option value="part_time">Part Time</option>
          <option value="student">Student</option>
          <option value="retired">Retired</option>
        </select>
      </div>

      <div class="form-group full-width">
        <label>Employment Details</label>
        <textarea id="employment_info" required></textarea>
      </div>

      <div class="form-group">
        <label>Income Details</label>
        <textarea id="income" required></textarea>
      </div>

      <div class="form-group">
        <label>Rental History Type</label>
        <select id="rental_history_type" required>
          <option value="">Select</option>
          <option value="first_time">First Time Renter</option>
          <option value="rented_before">Rented Before</option>
          <option value="rented_overseas">Rented Overseas</option>
        </select>
      </div>

      <div class="form-group full-width">
        <label>Rental History</label>
        <textarea id="rental_history" required></textarea>
      </div>

      <div class="form-group full-width">
        <label>Additional Notes</label>
        <textarea id="custom_note" required></textarea>
      </div>

    </div>

    <!--
      Button now contains:
        1. #generateBtnLabel  — the visible text / spinner
        2. .btn-progress-track — the 3px bar track hidden at bottom
    -->
    <button class="generate-submit" id="generateBtn" onclick="generateLetter()">
      <span id="generateBtnLabel">Generate Cover Letter</span>
      <div class="btn-progress-track" id="progressTrack">
        <div class="btn-progress-bar" id="progressBar"></div>
      </div>
    </button>

  </div>

</div>


<script>

function getCSRFToken() {
    return document.cookie
        .split('; ')
        .find(row => row.startsWith('csrftoken='))
        ?.split('=')[1];
}

function openModal(){
  document.getElementById("generateModal").style.display = "flex";
}

function closeModal(){
  document.getElementById("generateModal").style.display = "none";
}

/* ================================
   PROGRESS BAR
================================ */

let _progressInterval = null;
let _progressValue    = 0;

// Phases shown in the button label while waiting
const PHASES = [
  "Analysing your details\u2026",
  "Drafting your letter\u2026",
  "Polishing the tone\u2026",
  "Almost ready\u2026",
];
let _phaseIndex    = 0;
let _phaseInterval = null;

function startProgress() {
  const track = document.getElementById("progressTrack");
  const bar   = document.getElementById("progressBar");

  _progressValue = 0;
  bar.style.transition = "none";
  bar.style.width = "0%";
  track.style.display = "block";

  // Advance quickly to ~30 %, crawl to ~85 %, hold there until done
  _progressInterval = setInterval(() => {
    if (_progressValue < 30)       _progressValue += 3;
    else if (_progressValue < 60)  _progressValue += 1.2;
    else if (_progressValue < 85)  _progressValue += 0.35;

    bar.style.transition = "width .45s ease";
    bar.style.width = _progressValue + "%";
  }, 220);
}

function finishProgress(success) {
  clearInterval(_progressInterval);
  const bar   = document.getElementById("progressBar");
  const track = document.getElementById("progressTrack");

  if (success) {
    bar.style.transition = "width .2s ease";
    bar.style.width = "100%";
    setTimeout(() => {
      track.style.display = "none";
      bar.style.width = "0%";
    }, 300);
  } else {
    track.style.display = "none";
    bar.style.width = "0%";
  }
}

function setLoadingState() {
  const btn   = document.getElementById("generateBtn");
  const label = document.getElementById("generateBtnLabel");

  btn.classList.add("loading");

  // Cycle through phase labels every 4 s
  _phaseIndex = 0;
  label.innerHTML = '<span class="btn-spinner"></span>' + PHASES[0];

  _phaseInterval = setInterval(() => {
    _phaseIndex = Math.min(_phaseIndex + 1, PHASES.length - 1);
    label.innerHTML = '<span class="btn-spinner"></span>' + PHASES[_phaseIndex];
  }, 4000);

  startProgress();
}

function resetButtonState() {
  clearInterval(_phaseInterval);
  const btn   = document.getElementById("generateBtn");
  const label = document.getElementById("generateBtnLabel");
  btn.classList.remove("loading");
  label.textContent = "Generate Cover Letter";
}

/* ================================
   LOAD LETTERS
================================ */

function loadLetters(){

  fetch("/api/cover-letters/")
  .then(res => {

    if(res.status === 403){
      const grid = document.getElementById("lettersGrid");
      grid.innerHTML = `<div class="premium-state">
        <strong>Premium required</strong>
        Upgrade your account to generate and manage cover letters.
      </div>`;
      return null;
    }

    if(!res.ok){
      throw new Error("Failed to load letters");
    }

    return res.json();

  })
  .then(data => {

    if(data === null) return;

    const grid = document.getElementById("lettersGrid");
    grid.innerHTML = "";

    if(data.length === 0){

      grid.innerHTML = `<div class="empty-state">
        You haven't generated any cover letters yet.
      </div>`;

      return;
    }

    data.forEach(letter => {

      grid.innerHTML += `
        <div class="card">

          <div>

            <h3>${letter.property_address || "No Property"}</h3>

            <small>${new Date(letter.created_at).toLocaleDateString()}</small>

          </div>

          <div class="card-actions">

            <a class="btn-view" href="/cover-letters/${letter.id}/">
              View
            </a>

            <a class="btn-edit" href="/cover-letters/${letter.id}/">
              Edit
            </a>

          </div>

        </div>
      `;

    });

  })
  .catch(error => {

    const grid = document.getElementById("lettersGrid");
    grid.innerHTML = `<div class="empty-state">
      Something went wrong loading your cover letters. Please refresh the page.
    </div>`;

    console.error(error);

  });

}

/* ================================
   VALIDATE FORM
================================ */

function validateForm(){

  const fields = [
    "property_address",
    "name",
    "tone",
    "employment_type",
    "employment_info",
    "income",
    "rental_history_type",
    "rental_history",
    "custom_note"
  ];

  for(let id of fields){

    const el = document.getElementById(id);

    if(!el.value.trim()){
      alert("Please fill out all fields before generating the cover letter.");
      return false;
    }

  }

  return true;

}

/* ================================
   GENERATE LETTER
================================ */

function generateLetter(){

  if(!validateForm()){
    return;
  }

  setLoadingState();

  fetch("/api/cover-letters/generate/", {
    method: "POST",
    headers: {
        "Content-Type": "application/json",
        "X-CSRFToken": getCSRFToken()
    },
    body: JSON.stringify({
        property_address:    document.getElementById("property_address").value,
        tone:                document.getElementById("tone").value,
        employment_type:     document.getElementById("employment_type").value,
        rental_history_type: document.getElementById("rental_history_type").value,
        name:                document.getElementById("name").value,
        employment_info:     document.getElementById("employment_info").value,
        income:              document.getElementById("income").value,
        rental_history:      document.getElementById("rental_history").value,
        custom_note:         document.getElementById("custom_note").value
    })
  })
  .then(async res => {

    const data = await res.json();

    if(!res.ok){
      throw new Error(data.error || data.detail || "Server error");
    }

    return data;

  })
  .then(data => {

    finishProgress(true);
    resetButtonState();

    document.getElementById("generateModal").style.display = "none";

    loadLetters();

    document.querySelectorAll("#generateModal input, #generateModal textarea, #generateModal select")
      .forEach(el => el.value = "");

  })
  .catch(error => {

    finishProgress(false);
    resetButtonState();

    alert(error.message);

    console.error(error);

  });

}

document.addEventListener("DOMContentLoaded", loadLetters);

</script>

{% endblock content %}
