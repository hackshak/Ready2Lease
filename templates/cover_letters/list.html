{% extends "sidebar.html" %}
{% load static %}

{% block content %}

<style>
:root{
  --bg:#0b1020;
  --panel:#111a33;
  --panel2:#0f1730;
  --text:#e9eefc;
  --muted:#a9b4d6;
  --border:rgba(255,255,255,.10);
  --radius:18px;
  --primary:#6c7dff;
  --primary2:#8b5cf6;
  --shadow:0 14px 30px rgba(0,0,0,.35);
}

.wrap{
  max-width:1250px;
  margin:auto;
  padding:32px 24px;
}

/* TOPBAR */

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
  flex-wrap:wrap;
  gap:15px;
}

.topbar h2{
  color:white;
  font-size:22px;
  font-weight:600;
  margin:0;
}

.generate-btn{
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  border:0;
  padding:11px 18px;
  border-radius:12px;
  color:white;
  font-weight:600;
  cursor:pointer;
  box-shadow:0 10px 25px rgba(108,125,255,.35);
  transition:.25s;
  white-space:nowrap;
}

.generate-btn:hover{
  transform:translateY(-2px);
}

/* GRID */

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:22px;
}

/* CARD */

.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px;
  box-shadow:var(--shadow);
  transition:.25s;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.card:hover{
  transform:translateY(-5px);
  border-color:rgba(255,255,255,.18);
}

.card h3{
  margin:0 0 6px;
  font-size:16px;
  color:white;
}

.card small{
  color:var(--muted);
  font-size:12px;
}

/* BUTTON ROW */

.card-actions{
  display:flex;
  gap:10px;
  margin-top:18px;
}

.btn-view{
  flex:1;
  text-align:center;
  text-decoration:none;
  font-size:13px;
  font-weight:500;
  color:white;
  background:rgba(255,255,255,.08);
  padding:8px;
  border-radius:10px;
}

.btn-view:hover{
  background:rgba(255,255,255,.14);
}

.btn-edit{
  flex:1;
  text-align:center;
  text-decoration:none;
  font-size:13px;
  font-weight:500;
  color:white;
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  padding:8px;
  border-radius:10px;
}

/* EMPTY STATE */

.empty-state{
  text-align:center;
  padding:50px;
  color:var(--muted);
  border:1px dashed var(--border);
  border-radius:var(--radius);
  font-size:14px;
}

/* PREMIUM GATE STATE */

.premium-state{
  text-align:center;
  padding:50px;
  color:var(--muted);
  border:1px solid rgba(108,125,255,.35);
  border-radius:var(--radius);
  font-size:14px;
  background:rgba(108,125,255,.06);
  grid-column:1 / -1;
}

.premium-state strong{
  display:block;
  color:white;
  font-size:16px;
  margin-bottom:8px;
}

/* ================= MODAL ================= */

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:1000;
  backdrop-filter:blur(6px);
  padding:20px;
  overflow-y:auto;  /* allows scrolling of the modal overlay if needed */
}

.modal-content{
  background:var(--panel2);
  width:100%;
  max-width:860px;
  max-height:90vh;           /* prevent overflow beyond viewport */
  padding:28px;
  border-radius:var(--radius);
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  overflow-y:auto;           /* scroll inside the modal */
  scrollbar-width:thin;
}

/* custom scrollbar for webkit */
.modal-content::-webkit-scrollbar{
  width:5px;
}
.modal-content::-webkit-scrollbar-track{
  background:rgba(255,255,255,.05);
  border-radius:10px;
}
.modal-content::-webkit-scrollbar-thumb{
  background:rgba(108,125,255,.6);
  border-radius:10px;
}

/* HEADER */

.modal-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:22px;
  position:sticky;
  top:0;
  background:var(--panel2);
  padding-bottom:10px;
  z-index:5;
}

.modal-header h3{
  margin:0;
  font-size:17px;
  color:white;
}

.close{
  cursor:pointer;
  font-size:18px;
  color:var(--muted);
}

/* FORM GRID */

.form-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
}

.form-group{
  display:flex;
  flex-direction:column;
}

.form-group label{
  font-size:11px;
  color:var(--muted);
  margin-bottom:6px;
}

/* INPUTS */

.modal input,
.modal textarea,
.modal select{
  padding:10px 12px;
  background:rgba(255,255,255,.05);
  border:1px solid var(--border);
  border-radius:10px;
  color:white;
  font-size:12px;
  font-family:inherit;
  width:100%;
}

.modal textarea{
  min-height:70px;
  resize:vertical;
}

.modal input:focus,
.modal textarea:focus,
.modal select:focus{
  outline:none;
  border-color:var(--primary);
  box-shadow:0 0 0 2px rgba(108,125,255,.25);
}

.full-width{
  grid-column:1 / -1;
}

/* ================================ */
/* SUBMIT BUTTON + PROGRESS BAR     */
/* ================================ */

.generate-submit{
  margin-top:22px;
  width:100%;
  padding:13px;
  border-radius:12px;
  border:0;
  font-weight:600;
  font-size:14px;
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  color:white;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:opacity .2s;
}

.generate-submit.loading{
  opacity:.85;
  pointer-events:none;
}

.btn-progress-track{
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  height:3px;
  background:rgba(255,255,255,.18);
  display:none;
}

.btn-progress-bar{
  height:100%;
  width:0%;
  background:rgba(255,255,255,.9);
  border-radius:0 2px 2px 0;
  transition:width .45s ease;
  position:relative;
}

.btn-progress-bar::after{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(
    90deg,
    transparent 0%,
    rgba(255,255,255,.55) 50%,
    transparent 100%
  );
  animation:bar-shimmer 1.3s infinite;
}

@keyframes bar-shimmer{
  0%  { transform:translateX(-100%); }
  100%{ transform:translateX(300%);  }
}

.btn-spinner{
  display:inline-block;
  width:9px;
  height:9px;
  border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;
  border-radius:50%;
  animation:btn-spin .65s linear infinite;
  vertical-align:middle;
  margin-right:8px;
  margin-bottom:1px;
}

@keyframes btn-spin{
  to{ transform:rotate(360deg); }
}

/* ================================ */
/* RESPONSIVE (mobile & tablet)     */
/* ================================ */

@media(max-width:900px){
  .form-grid{
    grid-template-columns:1fr;  /* single column on tablet/mobile */
    gap:12px;
  }

  .modal-content{
    padding:20px;
    max-height:85vh;
  }

  .wrap{
    padding:20px 16px;
  }

  .topbar h2{
    font-size:19px;
  }

  .generate-btn{
    padding:8px 14px;
    font-size:13px;
  }

  .grid{
    grid-template-columns:1fr;   /* full width cards on small screens */
    gap:16px;
  }

  .card{
    padding:16px;
  }

  .card h3{
    font-size:14px;
  }

  .card-actions{
    flex-direction:column;
    gap:8px;
  }

  .btn-view, .btn-edit{
    width:100%;
    padding:10px;
  }
}

@media(max-width:560px){
  .modal-content{
    padding:16px;
    max-height:90vh;
  }

  .modal-header h3{
    font-size:15px;
  }

  .form-group label{
    font-size:10px;
  }

  .modal input, .modal textarea, .modal select{
    font-size:11px;
    padding:8px 10px;
  }

  .generate-submit{
    padding:11px;
    font-size:13px;
  }

  .empty-state, .premium-state{
    padding:30px 20px;
  }
}
</style>


<div class="wrap">

  <div class="topbar">
    <h2>My Cover Letters</h2>
    {% if is_premium %}
      <button class="generate-btn" onclick="openModal()">
        + Generate New Cover Letter
      </button>
    {% else %}
      <button class="generate-btn">
        🔒Premium feature
      </button>
    {% endif %}
  </div>

  <div class="grid" id="lettersGrid"></div>

</div>


<!-- Modal -->
<div class="modal" id="generateModal">
  <div class="modal-content">

    <div class="modal-header">
      <h3>Generate Landlord-Friendly Cover Letter</h3>
      <span class="close" onclick="closeModal()">✕</span>
    </div>

    <div class="form-grid">

      <div class="form-group full-width">
        <label>Property Address *</label>
        <input id="property_address" required>
      </div>

      <div class="form-group">
        <label>Full Name *</label>
        <input id="name" required>
      </div>

      <div class="form-group">
        <label>Tone *</label>
        <select id="tone" required>
          <option value="">Select</option>
          <option value="professional">Professional</option>
          <option value="friendly">Friendly</option>
          <option value="confident">Confident</option>
          <option value="direct">Short & Direct</option>
        </select>
      </div>

      <div class="form-group">
        <label>Employment Type *</label>
        <select id="employment_type" required>
          <option value="">Select</option>
          <option value="full_time">Full Time</option>
          <option value="part_time">Part Time</option>
          <option value="student">Student</option>
          <option value="retired">Retired</option>
        </select>
      </div>

      <div class="form-group full-width">
        <label>Employment Details *</label>
        <textarea id="employment_info" required placeholder="e.g., Software Engineer at XYZ Corp, 2 years"></textarea>
      </div>

      <div class="form-group">
        <label>Income Details *</label>
        <textarea id="income" required placeholder="e.g., $75,000 annually, stable income"></textarea>
      </div>

      <div class="form-group">
        <label>Rental History Type *</label>
        <select id="rental_history_type" required>
          <option value="">Select</option>
          <option value="first_time">First Time Renter</option>
          <option value="rented_before">Rented Before</option>
          <option value="rented_overseas">Rented Overseas</option>
        </select>
      </div>

      <div class="form-group full-width">
        <label>Rental History *</label>
        <textarea id="rental_history" required placeholder="Describe your past rental experience (or 'none' if first time)"></textarea>
      </div>

      <div class="form-group full-width">
        <label>Additional Notes</label>
        <textarea id="custom_note" placeholder="Any other info: pets, references, special requests..."></textarea>
      </div>

    </div>

    <button class="generate-submit" id="generateBtn" onclick="generateLetter()">
      <span id="generateBtnLabel">Generate Cover Letter</span>
      <div class="btn-progress-track" id="progressTrack">
        <div class="btn-progress-bar" id="progressBar"></div>
      </div>
    </button>

  </div>
</div>


<script>
function getCSRFToken() {
    return document.cookie
        .split('; ')
        .find(row => row.startsWith('csrftoken='))
        ?.split('=')[1];
}

function openModal(){
  document.getElementById("generateModal").style.display = "flex";
}

function closeModal(){
  document.getElementById("generateModal").style.display = "none";
}

/* ================================
   PROGRESS BAR
================================ */
let _progressInterval = null;
let _progressValue    = 0;

const PHASES = [
  "Analysing your details…",
  "Drafting your letter…",
  "Polishing the tone…",
  "Almost ready…",
];
let _phaseIndex    = 0;
let _phaseInterval = null;

function startProgress() {
  const track = document.getElementById("progressTrack");
  const bar   = document.getElementById("progressBar");

  _progressValue = 0;
  bar.style.transition = "none";
  bar.style.width = "0%";
  track.style.display = "block";

  _progressInterval = setInterval(() => {
    if (_progressValue < 30)       _progressValue += 3;
    else if (_progressValue < 60)  _progressValue += 1.2;
    else if (_progressValue < 85)  _progressValue += 0.35;

    bar.style.transition = "width .45s ease";
    bar.style.width = _progressValue + "%";
  }, 220);
}

function finishProgress(success) {
  clearInterval(_progressInterval);
  const bar   = document.getElementById("progressBar");
  const track = document.getElementById("progressTrack");

  if (success) {
    bar.style.transition = "width .2s ease";
    bar.style.width = "100%";
    setTimeout(() => {
      track.style.display = "none";
      bar.style.width = "0%";
    }, 300);
  } else {
    track.style.display = "none";
    bar.style.width = "0%";
  }
}

function setLoadingState() {
  const btn   = document.getElementById("generateBtn");
  const label = document.getElementById("generateBtnLabel");

  btn.classList.add("loading");

  _phaseIndex = 0;
  label.innerHTML = '<span class="btn-spinner"></span>' + PHASES[0];

  _phaseInterval = setInterval(() => {
    _phaseIndex = Math.min(_phaseIndex + 1, PHASES.length - 1);
    label.innerHTML = '<span class="btn-spinner"></span>' + PHASES[_phaseIndex];
  }, 4000);

  startProgress();
}

function resetButtonState() {
  clearInterval(_phaseInterval);
  const btn   = document.getElementById("generateBtn");
  const label = document.getElementById("generateBtnLabel");
  btn.classList.remove("loading");
  label.textContent = "Generate Cover Letter";
}

/* ================================
   LOAD LETTERS
================================ */
function loadLetters(){
  fetch("/api/cover-letters/")
  .then(res => {
    if(res.status === 403){
      const grid = document.getElementById("lettersGrid");
      grid.innerHTML = `<div class="premium-state">
        <strong>Premium required</strong>
        Upgrade your account to generate and manage cover letters.
      </div>`;
      return null;
    }
    if(!res.ok) throw new Error("Failed to load letters");
    return res.json();
  })
  .then(data => {
    if(data === null) return;
    const grid = document.getElementById("lettersGrid");
    grid.innerHTML = "";
    if(data.length === 0){
      grid.innerHTML = `<div class="empty-state">
        You haven't generated any cover letters yet.
      </div>`;
      return;
    }
    data.forEach(letter => {
      grid.innerHTML += `
        <div class="card">
          <div>
            <h3>${escapeHtml(letter.property_address || "No Property")}</h3>
            <small>${new Date(letter.created_at).toLocaleDateString()}</small>
          </div>
          <div class="card-actions">
            <a class="btn-view" href="/cover-letters/${letter.id}/">View</a>
            <a class="btn-edit" href="/cover-letters/${letter.id}/">Edit</a>
          </div>
        </div>
      `;
    });
  })
  .catch(error => {
    const grid = document.getElementById("lettersGrid");
    grid.innerHTML = `<div class="empty-state">
      Something went wrong loading your cover letters. Please refresh the page.
    </div>`;
    console.error(error);
  });
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

/* ================================
   VALIDATE FORM
================================ */
function validateForm(){
  const fields = [
    "property_address", "name", "tone", "employment_type",
    "employment_info", "income", "rental_history_type", "rental_history"
  ];
  for(let id of fields){
    const el = document.getElementById(id);
    if(!el.value.trim()){
      alert("Please fill out all required fields.");
      return false;
    }
  }
  return true;
}

/* ================================
   GENERATE LETTER
================================ */
function generateLetter(){
  if(!validateForm()) return;
  setLoadingState();

  fetch("/api/cover-letters/generate/", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "X-CSRFToken": getCSRFToken()
    },
    body: JSON.stringify({
      property_address:    document.getElementById("property_address").value,
      tone:                document.getElementById("tone").value,
      employment_type:     document.getElementById("employment_type").value,
      rental_history_type: document.getElementById("rental_history_type").value,
      name:                document.getElementById("name").value,
      employment_info:     document.getElementById("employment_info").value,
      income:              document.getElementById("income").value,
      rental_history:      document.getElementById("rental_history").value,
      custom_note:         document.getElementById("custom_note").value
    })
  })
  .then(async res => {
    const data = await res.json();
    if(!res.ok) throw new Error(data.error || data.detail || "Server error");
    return data;
  })
  .then(() => {
    finishProgress(true);
    resetButtonState();
    closeModal();
    loadLetters();
    // clear all form fields
    document.querySelectorAll("#generateModal input, #generateModal textarea, #generateModal select")
      .forEach(el => el.value = "");
  })
  .catch(error => {
    finishProgress(false);
    resetButtonState();
    alert(error.message);
    console.error(error);
  });
}

document.addEventListener("DOMContentLoaded", loadLetters);
</script>

{% endblock content %}
