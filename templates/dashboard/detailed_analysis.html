{% extends "sidebar.html" %}
{% load static %}

{% block content %}

<style>
:root{
  --bg:#0b1225;
  --panel:#121c36;
  --panel2:#162246;
  --text:#e8edff;
  --muted:#9fb0ff;
  --border:rgba(255,255,255,.08);
  --radius:20px;
  --shadow:0 20px 40px rgba(0,0,0,.35);
  --good:#28d17c;
  --mid:#f7c948;
  --bad:#ff5a7a;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(180deg,#0a0f1f,#0d1631);
  color:var(--text);
}

/* ============================= */
/* WRAPPER                       */
/* ============================= */

.wrapper{
  padding:30px;
  display:grid;
  grid-template-columns: 3fr 1.2fr;
  gap:25px;
}

.left{display:flex;flex-direction:column;gap:20px;}

.right{
  background:linear-gradient(180deg,var(--panel),var(--panel2));
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px;
  box-shadow:var(--shadow);
  max-height:85vh;
  overflow-y:auto;
}

/* ============================= */
/* CARDS                         */
/* ============================= */

.card{
  background:linear-gradient(180deg,var(--panel),var(--panel2));
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px;
  box-shadow:var(--shadow);
}

.card h2{margin:0 0 15px;font-size:15px;font-weight:600;}

/* ============================= */
/* SCORE                         */
/* ============================= */

.score-wrap{display:flex;align-items:center;gap:25px;}

.score-ring{
  width:110px;
  height:110px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}

.score-ring b{font-size:28px}

/* ============================= */
/* KPI GRID                      */
/* ============================= */

.kpi-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  margin-top:20px;
}

.kpi{
  background:rgba(255,255,255,.05);
  border-radius:16px;
  padding:15px;
  border:1px solid var(--border);
}

.kpi span{font-size:12px;color:var(--muted);}
.kpi strong{display:block;margin-top:5px;}

/* ============================= */
/* BAR ROWS                      */
/* ============================= */

.bar-row{
  display:grid;
  grid-template-columns:160px 1fr 50px;
  gap:12px;
  align-items:center;
  margin-bottom:12px;
}

.bar-track{
  height:10px;
  border-radius:20px;
  background:rgba(255,255,255,.08);
  overflow:hidden;
}

.bar-fill{
  height:100%;
  width:0%;
  border-radius:20px;
  background:linear-gradient(90deg,var(--good),#6c7dff);
  transition:width .4s ease;
}

/* ============================= */
/* ITEM BOXES                    */
/* ============================= */

.item-box{
  background:rgba(255,255,255,.05);
  border-radius:16px;
  padding:14px;
  margin-bottom:12px;
  border:1px solid var(--border);
}

.priority{
  font-size:11px;
  padding:4px 10px;
  border-radius:20px;
  margin-top:6px;
  display:inline-block;
}

.priority.high{background:rgba(255,90,122,.2); color:var(--bad);}
.priority.medium{background:rgba(247,201,72,.2); color:var(--mid);}
.priority.low{background:rgba(40,209,124,.2); color:var(--good);}

/* ============================= */
/* ASSESSMENT SIDEBAR ITEMS      */
/* ============================= */

.assessment-item{
  background:rgba(255,255,255,.05);
  border:1px solid var(--border);
  border-radius:16px;
  padding:14px;
  margin-top:15px;
  transition:all .25s ease;
}

.assessment-item.active{
  border:1px solid #6c7dff;
  background:rgba(108,125,255,.1);
}

.assessment-item button{
  margin-top:8px;
  width:100%;
  padding:8px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  background:linear-gradient(135deg,#6c7dff,#8b5cf6);
  color:white;
}

/* ============================= */
/* MOBILE ASSESSMENT TOGGLE BTN  */
/* ============================= */

.mob-history-toggle{
  display:none;
  width:100%;
  padding:12px;
  background:linear-gradient(135deg,rgba(108,125,255,.2),rgba(139,92,246,.15));
  border:1px solid rgba(108,125,255,.35);
  border-radius:14px;
  color:var(--text);
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  text-align:center;
  margin-bottom:4px;
}

.mob-history-panel{
  display:none;
  background:linear-gradient(180deg,var(--panel),var(--panel2));
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px;
  box-shadow:var(--shadow);
  margin-bottom:16px;
}

.mob-history-panel.open{display:block;}

/* ============================= */
/* RESPONSIVE — TABLET (≤1024px) */
/* ============================= */

@media(max-width:1024px){
  .wrapper{
    grid-template-columns:1fr;
    padding:20px;
  }

  .right{
    display:none; /* hidden on mobile — shown via toggle panel */
    max-height:none;
  }

  .mob-history-toggle{display:block;}
}

/* ============================= */
/* RESPONSIVE — MOBILE (≤600px)  */
/* ============================= */

@media(max-width:600px){
  .wrapper{
    padding:12px;
    gap:14px;
  }

  .card{
    padding:14px;
    border-radius:16px;
  }

  .card h2{font-size:14px;margin-bottom:10px;}

  /* Score ring: shrink on mobile */
  .score-ring{
    width:88px;
    height:88px;
  }

  .score-ring b{font-size:22px;}

  .score-wrap{gap:16px;}

  /* Bar rows: stack label above bar on mobile */
  .bar-row{
    grid-template-columns:1fr 40px;
    grid-template-rows:auto auto;
    gap:6px;
  }

  .bar-row > div:first-child{
    grid-column:1 / -1;
    font-size:12px;
  }

  .bar-track{
    grid-column:1;
    grid-row:2;
  }

  .bar-row > div:last-child{
    grid-column:2;
    grid-row:2;
    font-size:12px;
    text-align:right;
  }

  /* KPI grid: single column */
  .kpi-grid{
    grid-template-columns:1fr 1fr;
    gap:10px;
  }

  .kpi{padding:11px;}
  .kpi span{font-size:11px;}

  .item-box{
    padding:12px;
    font-size:13px;
  }

  .assessment-item{
    padding:12px;
  }
}

/* ============================= */
/* RESPONSIVE — SMALL (≤400px)   */
/* ============================= */

@media(max-width:400px){
  .kpi-grid{grid-template-columns:1fr;}
}
</style>

<div class="wrapper">
  <div class="left">

    <!-- Mobile: Previous Assessments toggle -->
    <button class="mob-history-toggle" onclick="toggleMobHistory()">
      📋 Previous Assessments <span id="mobToggleArrow">▼</span>
    </button>
    <div class="mob-history-panel" id="mobHistoryPanel">
      <h2 style="margin:0 0 4px;font-size:15px;font-weight:600;">Previous Assessments</h2>
      <div id="assessmentListMob"></div>
    </div>

    <div class="card">
      <h2>Readiness Snapshot</h2>

      <div class="score-wrap">
        <div class="score-ring" id="scoreRing">
          <b id="scoreValue">—</b>
        </div>
        <div>
          <div id="statusText"></div>
        </div>
      </div>

      <div class="kpi-grid">
        <div class="kpi"><span>Last Assessment</span><strong id="lastAssessment">—</strong></div>
        <div class="kpi"><span>Score Trend</span><strong id="scoreTrend">—</strong></div>
        <div class="kpi"><span>Income to Rent</span><strong id="incomeRent">—</strong></div>
        <div class="kpi"><span>Risk Level</span><strong id="riskLevel">—</strong></div>
      </div>
    </div>

    <div class="card"><h2>Category Breakdown</h2><div id="breakdownList"></div></div>

    <div class="card" id="gapCard">
      <h2>Gap Analysis</h2>
      <div id="gapsList"></div>
    </div>

    <div class="card" id="recommendationCard">
      <h2>Improvement Recommendations</h2>
      <div id="recommendationsList"></div>
    </div>

  </div>

  <!-- Desktop: right sidebar -->
  <div class="right">
    <h2>Previous Assessments</h2>
    <div id="assessmentList"></div>
  </div>
</div>

<script>
function $(id){return document.getElementById(id);}
function clamp(n,min,max){return Math.max(min,Math.min(max,n));}

let scoreInterval=null;
let currentController=null;
let hasLoadedInitial=false;

/* Mobile history panel toggle */
function toggleMobHistory(){
  const panel=document.getElementById("mobHistoryPanel");
  const arrow=document.getElementById("mobToggleArrow");
  const isOpen=panel.classList.toggle("open");
  arrow.textContent=isOpen?"▲":"▼";
}

/* Animate Score */
function animateScore(newScore){
  if(scoreInterval) clearInterval(scoreInterval);

  const el=$("scoreValue");
  el.textContent="0%";

  let current=0;
  const step=Math.max(1,Math.ceil(newScore/25));

  scoreInterval=setInterval(()=>{
    current+=step;
    if(current>=newScore){
      current=newScore;
      clearInterval(scoreInterval);
    }
    el.textContent=current + "%";
  },15);
}

/* Render assessment items into a given container */
function renderAssessmentItems(containerId, assessments){
  const list=$(containerId);
  list.innerHTML="";

  assessments.forEach(a=>{
    const div=document.createElement("div");
    div.className="assessment-item";
    div.dataset.id=a.id;

    div.innerHTML=`
      <strong>Score: ${a.score}%</strong>
      <div style="font-size:12px;color:#9fb0ff">${a.created_at}</div>
      <button type="button">Detailed Analysis</button>
    `;

    div.querySelector("button").addEventListener("click",()=>{
      loadDetailed(a.id);
    });

    list.appendChild(div);
  });
}

/* Load All Assessments */
async function loadAssessments(){

  const res=await fetch("/api/detailed-readiness/",{
    credentials:"same-origin"
  });

  const data=await res.json();

  /* Render into both desktop sidebar and mobile panel */
  renderAssessmentItems("assessmentList", data.previous_assessments);
  renderAssessmentItems("assessmentListMob", data.previous_assessments);

  if(!hasLoadedInitial){
    hasLoadedInitial=true;
    loadDetailed(data.previous_assessments[0].id);
  }
}

/* Mark active item in both lists */
function setActiveItems(id){
  document.querySelectorAll(".assessment-item")
    .forEach(el=>{
      el.classList.toggle("active",Number(el.dataset.id)===Number(id));
    });
}

/* Load Single Assessment */
async function loadDetailed(id){

  setActiveItems(id);

  const res=await fetch(`/api/detailed-readiness/?assessment_id=${id}`,{
    credentials:"same-origin"
  });

  const data=await res.json();
  const score=data.score ?? 0;

  animateScore(score);

  /* Hide gap + recommendations if score 100 */
  if(score===100){
    $("gapCard").style.display="none";
    $("recommendationCard").style.display="none";
  }else{
    $("gapCard").style.display="block";
    $("recommendationCard").style.display="block";
  }

  const deg=Math.round(score/100*360);
  const color=
    score>=80?"var(--good)":
    score>=55?"var(--mid)":
    "var(--bad)";

  $("scoreRing").style.background=
    `radial-gradient(circle,#121c36 60%,transparent 61%),
     conic-gradient(${color} 0deg,${color} ${deg}deg,rgba(255,255,255,.08) ${deg}deg)`;

  $("riskLevel").textContent=data.risk_level ?? "—";

  $("lastAssessment").textContent=
    data.last_assessment
      ? new Date(data.last_assessment).toLocaleDateString()
      : "—";

  if(data.score_prev !== undefined){
    const diff=score-data.score_prev;
    $("scoreTrend").textContent=
      diff>0?`+${diff}`:diff;
  } else {
    $("scoreTrend").textContent="—";
  }

  $("incomeRent").textContent=
    data.income_weekly && data.target_rent_weekly
      ? (data.income_weekly/data.target_rent_weekly).toFixed(2)
      : "—";

  $("statusText").textContent=
    score>=80?"Strong Approval Odds":
    score>=55?"Moderate Competitiveness":
    "High Risk";

  /* Breakdown */
  const br=$("breakdownList");
  br.innerHTML="";
  data.breakdown?.forEach(cat=>{
    const row=document.createElement("div");
    row.className="bar-row";
    row.innerHTML=`
      <div>${cat.key.replace(/_/g," ")}</div>
      <div class="bar-track"><div class="bar-fill"></div></div>
      <div>${cat.value}%</div>
    `;
    br.appendChild(row);

    requestAnimationFrame(()=>{
      row.querySelector(".bar-fill").style.width=
        clamp(cat.value,0,100)+"%";
    });
  });

  /* Gaps */
  const gaps=$("gapsList");
  gaps.innerHTML="";
  Object.entries(data.gaps || {}).forEach(([k,v])=>{
    const div=document.createElement("div");
    div.className="item-box";
    div.innerHTML=`
      <strong>${k.replace(/_/g," ")}</strong>
      <p style="color:#9fb0ff;font-size:13px">${v}</p>
    `;
    gaps.appendChild(div);
  });

  /* Recommendations */
  const rec=$("recommendationsList");
  rec.innerHTML="";
  data.recommendations?.forEach(r=>{
    const div=document.createElement("div");
    div.className="item-box";
    div.innerHTML=`
      <strong>${r.category.replace(/_/g," ")}</strong>
      <p style="color:#9fb0ff;font-size:13px">${r.suggestion}</p>
      <span class="priority ${r.priority}">
        ${r.priority.toUpperCase()}
      </span>
    `;
    rec.appendChild(div);
  });

}

document.addEventListener("DOMContentLoaded",loadAssessments);
</script>

{% endblock %}
