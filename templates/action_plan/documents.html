{% extends "sidebar.html" %}
{% block content %}

<style>
:root{
  --bg:#0b1020;
  --panel:#111a33;
  --text:#e9eefc;
  --muted:#a9b4d6;
  --border:rgba(255,255,255,.10);
  --radius:18px;
  --good:#28d17c;
  --primary:#6c7dff;
  --primary2:#8b5cf6;
}

body{background:var(--bg);color:var(--text);}

/* ============================= */
/* LAYOUT                        */
/* ============================= */

.wrap{
  padding:30px 20px;
  max-width:1100px;
  margin:auto;
}

/* ============================= */
/* CARDS                         */
/* ============================= */

.card{
  border:1px solid var(--border);
  background: rgba(17,26,51,.75);
  border-radius: var(--radius);
  padding:20px;
  margin-bottom:25px;
}

h1{margin:0 0 8px;font-size:22px;}
.sub{color:var(--muted);font-size:13px;margin-bottom:15px;}

/* ============================= */
/* ASSESSMENT SELECT             */
/* ============================= */

.assessmentSelectWrap{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.assessmentLabel{
  font-size:12px;
  color:var(--muted);
}

select{
  width:100%;
  background:#0f1730;
  border:1px solid var(--border);
  color:var(--text);
  padding:12px;
  border-radius:10px;
  font-size:13px;
  outline:none;
  transition:.2s;
}

select:hover{ border-color:var(--primary); }

select:focus{
  border-color:var(--primary);
  box-shadow:0 0 0 2px rgba(108,125,255,.25);
}

/* ============================= */
/* PROGRESS BAR                  */
/* ============================= */

.progressWrap{margin-top:20px;}

.track{
  height:12px;
  border-radius:999px;
  background: rgba(255,255,255,.10);
  overflow:hidden;
}

.fill{
  height:100%;
  width:0%;
  border-radius:999px;
  background: linear-gradient(90deg, var(--good), var(--primary));
  transition:.3s ease;
}

/* ============================= */
/* DOCUMENT GRID                 */
/* ============================= */

.grid{
  margin-top:25px;
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap:18px;
}

.docCard{
  border:1px solid var(--border);
  background: rgba(255,255,255,.05);
  border-radius:16px;
  padding:16px;
}

.docCard.completed{
  border:1px solid var(--good);
}

.docCard h3{margin:0;font-size:15px;}
.docCard p{margin:6px 0 12px;color:var(--muted);font-size:12px;}

/* ============================= */
/* BUTTONS                       */
/* ============================= */

button{
  border:0;
  cursor:pointer;
  color:#fff;
  padding:8px 12px;
  border-radius:10px;
  font-size:12px;
  font-weight:600;
  background: linear-gradient(135deg, var(--primary), var(--primary2));
}

.btnGhost{
  background: rgba(255,255,255,.08);
  border:1px solid var(--border);
}

.actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

/* File input: styled for dark theme */
.actions input[type="file"]{
  font-size:12px;
  color:var(--muted);
  background:rgba(255,255,255,.05);
  border:1px solid var(--border);
  border-radius:10px;
  padding:7px 10px;
  cursor:pointer;
  width:100%;
  max-width:100%;
}

.actions input[type="file"]::-webkit-file-upload-button{
  background:linear-gradient(135deg, var(--primary), var(--primary2));
  color:#fff;
  border:none;
  border-radius:8px;
  padding:5px 10px;
  font-size:11px;
  font-weight:600;
  cursor:pointer;
  margin-right:8px;
}

/* ============================= */
/* TOAST                         */
/* ============================= */

.toast{
  position:fixed;
  bottom:24px;
  left:50%;
  transform:translateX(-50%);
  background:#111a33;
  border:1px solid var(--border);
  padding:10px 18px;
  border-radius:12px;
  font-size:13px;
  opacity:0;
  transition:.2s;
  z-index:9999;
  white-space:nowrap;
  pointer-events:none;
}

.toast.show{opacity:1;}

/* ============================= */
/* RESPONSIVE — TABLET (≤768px)  */
/* ============================= */

@media(max-width:768px){
  .wrap{
    padding:20px 14px;
  }

  .grid{
    grid-template-columns: 1fr 1fr;
    gap:14px;
  }

  h1{font-size:19px;}
}

/* ============================= */
/* RESPONSIVE — MOBILE (≤560px)  */
/* ============================= */

@media(max-width:560px){
  .wrap{
    padding:14px 12px 40px;
  }

  .card{
    padding:14px;
    border-radius:14px;
    margin-bottom:16px;
  }

  h1{font-size:17px;}
  .sub{font-size:12px;}

  /* Single column doc grid on mobile */
  .grid{
    grid-template-columns: 1fr;
    gap:12px;
    margin-top:16px;
  }

  .docCard{
    padding:14px;
    border-radius:14px;
  }

  .docCard h3{font-size:14px;}
  .docCard p{font-size:12px;margin-bottom:10px;}

  /* Progress text */
  #progressText{
    font-size:12px;
    margin-bottom:8px;
  }

  .track{height:10px;}

  /* File input full-width already — just ensure button is reachable */
  .actions{
    flex-direction:column;
    gap:8px;
  }

  .actions a,
  .actions button{
    width:100%;
    text-align:center;
    display:block;
  }

  .actions input[type="file"]{
    width:100%;
  }

  /* Toast: wider on mobile so text doesn't clip */
  .toast{
    left:12px;
    right:12px;
    transform:none;
    text-align:center;
    white-space:normal;
  }
}

/* ============================= */
/* RESPONSIVE — SMALL (≤400px)   */
/* ============================= */

@media(max-width:400px){
  select{font-size:12px;padding:10px;}
}
</style>

<div class="wrap">

  <div class="card">

    <h1>Documents Checklist & Tracker</h1>
    <p class="sub">Select an assessment to manage required documents.</p>

    <div class="assessmentSelectWrap">

      <label class="assessmentLabel">
        Choose Assessment
      </label>

      <select id="assessmentSelect">
        <option value="">Select an assessment...</option>

        {% for assessment in assessments %}
          <option value="{{ assessment.id }}">
            📅 Assessment from {{ assessment.created_at|date:"F d, Y" }}
          </option>
        {% endfor %}

      </select>

    </div>

    <div class="progressWrap" id="progressSection" style="display:none;">
      <p id="progressText"></p>
      <div class="track">
        <div class="fill" id="progressBar"></div>
      </div>
    </div>

  </div>

  <div class="grid" id="documentsContainer"></div>

</div>

<div class="toast" id="toast"></div>

<script>

let selectedAssessment = null;
const csrfToken = "{{ csrf_token }}";

function showToast(msg){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

document.getElementById("assessmentSelect")
.addEventListener("change", function(){
  selectedAssessment=this.value;
  if(selectedAssessment){
    loadChecklist();
  }
});

function loadChecklist(){
  fetch(`/checklist/${selectedAssessment}/`)
  .then(res=>res.json())
  .then(data=>{

    document.getElementById("progressSection").style.display="block";

    document.getElementById("progressText").innerText =
      `${data.completed} / ${data.total} Completed (${data.percentage}%)`;

    document.getElementById("progressBar").style.width =
      data.percentage + "%";

    const container=document.getElementById("documentsContainer");
    container.innerHTML="";

    data.checklist.forEach(item=>{

      const card=document.createElement("div");
      card.className="docCard"+(item.uploaded?" completed":"");

      card.innerHTML=`
        <h3>${item.title} ${item.uploaded?"✔":""}</h3>
        <p>${item.description}</p>
        <div class="actions" id="actions-${item.key}"></div>
      `;

      const actions=card.querySelector(`#actions-${item.key}`);

      if(item.uploaded){

        if(item.file_url){
          actions.innerHTML+=`
            <a href="${item.file_url}" target="_blank" style="width:100%">
              <button class="btnGhost" style="width:100%">View</button>
            </a>`;
        }

        actions.innerHTML+=`
          <button class="btnGhost" style="width:100%"
            onclick="deleteDoc('${item.key}',${item.object_id})">
            Delete
          </button>`;
      }
      else{

        actions.innerHTML+=`
          <input type="file"
            onchange="uploadFile('${item.key}',this.files[0])">
        `;
      }

      container.appendChild(card);

    });

  });
}

function uploadFile(type,file){

  if(!file){
    showToast("Please select a file");
    return;
  }

  const formData=new FormData();

  if(type==="reference_letter"){

    formData.append("file",file);

    fetch(`/add-reference/${selectedAssessment}/`,{
      method:"POST",
      headers:{"X-CSRFToken":csrfToken},
      body:formData
    }).then(()=>{
      showToast("Reference uploaded");
      loadChecklist();
    });

  }
  else if(type==="cover_letter"){

    formData.append("file",file);

    fetch(`/save-cover-letter/${selectedAssessment}/`,{
      method:"POST",
      headers:{"X-CSRFToken":csrfToken},
      body:formData
    }).then(()=>{
      showToast("Cover letter uploaded");
      loadChecklist();
    });

  }
  else{

    formData.append("document_type",type);
    formData.append("file",file);

    fetch(`/upload-document/${selectedAssessment}/`,{
      method:"POST",
      headers:{"X-CSRFToken":csrfToken},
      body:formData
    }).then(()=>{
      showToast("Uploaded");
      loadChecklist();
    });

  }

}

function deleteDoc(type,id){

  fetch(`/checklist/${selectedAssessment}/delete/${type}/${id}/`,{
    method:"DELETE",
    headers:{"X-CSRFToken":csrfToken}
  }).then(()=>{
    showToast("Deleted");
    loadChecklist();
  });

}

</script>

{% endblock %}
